services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_ALLOWED_CHANNEL_ID: ${DISCORD_ALLOWED_CHANNEL_ID:-}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/cloudcord.sqlite}
      ALLOW_CONTAINER_HOSTNAMES: ${ALLOW_CONTAINER_HOSTNAMES:-true}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-}
      ALLOWED_PORT_RANGES: ${ALLOWED_PORT_RANGES:-1-65535}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
      CLOUDFLARE_TUNNEL_ID: ${CLOUDFLARE_TUNNEL_ID:-}
      CLOUDFLARE_BASE_DOMAIN: ${CLOUDFLARE_BASE_DOMAIN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - cloudcord-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  cloudcord-data:
